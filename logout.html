<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logout Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#dfe3e8;
}

.container{
    display:flex;
    min-height:100vh;
}

/* Sidebar */
.sidebar{
    width:275px;
    background:#2f435a;
    color:white;
    padding:25px;
}

.sidebar h1{
    text-align:center;
    margin-bottom:40px;
    font-size:32px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    margin:20px 0;
}

.sidebar ul li a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:8px;
    font-size:16px;
}

.sidebar ul li a:hover,
.sidebar ul li.active a{
    background:#3b526d;
}

/* Main Content */
.main{
    flex:1;
    padding:30px;
}

.header{
    background:#344b63;
    color:white;
    text-align:center;
    padding:30px;
    border-radius:12px;
    font-size:28px;
    font-weight:bold;
    margin-bottom:25px;
}

.logout-card{
    background:#fff;
    padding:45px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.logout-card h2{
    color:#d9534f;
    margin-bottom:20px;
    font-size:18px;
}

.logout-card p{
    color:#555;
    font-size:18px;
    margin-bottom:25px;
}

.btn{
    background:#28a745;
    color:white;
    text-decoration:none;
    padding:14px 28px;
    border-radius:6px;
    font-size:18px;
    display:inline-block;
}

.btn:hover{
    background:#218838;
}
</style>
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h1>Dashboard</h1>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="student.html">Students</a></li>
            <li><a href="setting.html">Settings</a></li>
            <li class="active"><a href="logout.html">Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="header">
            Logout
        </div>

        <div class="logout-card">
            <h2>You are now logged out.</h2>

            <p>
                Thank you for using the Student Dashboard.
                Click below to return to the homepage or log back in.
            </p>

            <a href="index.html" class="btn">Return to Home</a>
        </div>

    </div>

</div>

</body>
</html>
